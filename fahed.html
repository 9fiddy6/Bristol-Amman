<head>
    <meta charset="UTF-8">

    <title>Fahed Al Ashi - Digital Business Card</title>
    <!-- Importing Elegant Fonts: Great Vibes for the 'B' script, Playfair for Serif, Montserrat for Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Color Palette extracted from the PDF */
            --bg-dark: #2a2a2a;
            --bg-card: #333333;
            --gold-primary: #C8A97E;
            --gold-light: #E0C89E;
            --burgundy: #7A203F;
            --text-light: #F0F0F0;
            --text-muted: #A0A0A0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-light);
        }

        /* Main Card Container */
        .card-container {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(200, 169, 126, 0.1);
            position: relative;
        }

        /* Top Brand Section */
        .brand-header {
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
            border-bottom: 1px solid rgba(200, 169, 126, 0.2);
        }

        /* Subtle background pattern/gradient for the header */
        .brand-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top, rgba(200, 169, 126, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        /* The signature "B" logo from the PDF */
        .logo-b {
            font-family: 'Great Vibes', cursive;
            font-size: 110px;
            line-height: 0.8;
            color: var(--gold-primary);
            text-shadow: -3px 3px 0px var(--burgundy);
            margin-bottom: 10px;
            font-weight: 400;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            letter-spacing: 4px;
            color: var(--gold-primary);
            text-transform: uppercase;
            margin-top: 15px;
        }

        .brand-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            letter-spacing: 6px;
            color: var(--text-light);
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Profile Details Section */
        .profile-section {
            padding: 1px 30px;
            text-align: center;
        }

        .profile-name {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .profile-title {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 3px;
            color: var(--gold-primary);
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* Contact Links */
        .contact-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 16px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-light);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .contact-item:hover {
            background: rgba(200, 169, 126, 0.1);
            border-color: rgba(200, 169, 126, 0.3);
            transform: translateY(-2px);
        }

        .contact-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(200, 169, 126, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            flex-shrink: 0;
            color: var(--gold-primary);
        }

        .contact-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .contact-text-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .contact-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 3px;
        }

        .contact-value {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Action Buttons */
        .action-section {
            padding: 0 30px 35px;
        }

        .btn-save {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #D4AF37 0%, #AA771C 100%);
            color: #111;
            text-align: center;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(200, 169, 126, 0.2);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(200, 169, 126, 0.4);
            filter: brightness(1.1);
        }

    </style>
</head>

    <title>Circular Photo Container</title>
    <style>
        /* This is the CSS for the container */
        .photo-container {
            /* 1. Essential: Make it a square */
            width: 200px;  /* You can change this size */
            height: 200px; /* Must match the width */

            /* 2. Essential: Make it a circle */
            border-radius: 50%;

            /* 3. Essential: Hide any parts of the photo that don't fit */
            overflow: hidden;

            /* Optional: Centering and styling */
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid white; /* Adds a nice border */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); /* Adds a soft shadow */
            margin: 50px auto; /* Centers the container on the page */
        }

        /* This styles the actual image inside the container */
        .photo-container img {
            /* Essential: Ensure the image fills the container */
            width: 100%;
            height: 100%;

            /* Essential: Prevents the image from stretching if it's not a square */
            object-fit: cover; 

            /* If the photo needs slight repositioning, use object-position */
            /* object-position: center top; */
        }
.logo-b {
    /* Set exact size */
    width: 200px;
    height: 200px;
    
    /* Make it a circle */
    border-radius: 50%;
    
    /* Ensure the image stays inside the circle */
    overflow: hidden;
    
    /* THE UPDATES: */
    background-color: transparent; /* Makes the circle container see-through */
    margin: 20px auto;            /* Centers the container horizontally */
    
    /* Keep the centering for the SVG inside */
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo-b img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* Keeps your logo from stretching */
    padding: 10px;       /* Adjust this if you want the logo bigger or smaller */
    box-sizing: border-box;
}

    <script>
        // Function to dynamically generate and download a standard .vcf file
        function downloadVCard() {
            const vCardData = `BEGIN:VCARD
VERSION:3.0
N:Al Ashi;Fahed;;;
FN:Fahed Al Ashi
ORG:Bristol Hotel
TITLE:Business Analyst
TEL;TYPE=WORK,VOICE:+962 6 5923400
TEL;TYPE=CELL,VOICE:+962 796996955
EMAIL;TYPE=PREF,INTERNET:fahed@bristolamman.com
EMAIL;TYPE=INTERNET:bristol@bristolamman.com
URL:https://www.bristolamman.com
END:VCARD`;

            // Create a Blob containing the vCard data
            const blob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
            
            // Create a temporary link element to trigger the download
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'Fahed_Al_Ashi.vcf');
            
            // Append to body, click, and clean up
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
        }
    </script>
